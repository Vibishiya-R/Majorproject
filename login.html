{% include 'header_home.html' %}
<form action="" method="post" enctype="multipart/form-data">
    {%csrf_token%}
    <div class="container-fluid">
        <div class="row">
            <div class="col-sm-7">
                <img src="../static/index/img/course-3.jpg" class="img-fluid" alt="">
            </div>
            <div class="col-sm-5">
                <div class="text-center mt-2 pb-2">
                    <h3>Login</h3>
                </div>
                <div class="row">


                    <div class="col-sm-4 pb-2">
                        User Name
                    </div>
                    <div class="col-sm-8 pb-2">
                        <input type="text" class="form-control" name="uname">
                    </div>
                    <div class="col-sm-4 pb-2">
                        Password
                    </div>
                    <div class="col-sm-8 pb-2">
                        <input type="password" class="form-control" name="pass1">
                    </div>
                    <div class="col-sm-4 pb-2">

                    </div>
                    <div class="col-sm-8 pb-2">
                        <button type="submit" value="Login" class="btn btn-success shadow-none"
                            name="save">Login</button>
                      
                    </div>
                </div>
            </div>

        </div>
    </div>
</form>

    alert("{{msg}}")
</script>
